# =============================================================================
# RL Evaluation Configuration
# Runs a trained policy deterministically and logs results.
# =============================================================================

N: 22
L: 300.0
dt: 0.1
T: 150.0
initial_speed: 5.5
seed: 0            # Will be overridden by evaluation script
output_path: "output/rl_eval"

initial_conditions: "uniform"
perturbation_enabled: true
perturbation_vehicle: 0
perturbation_time: 3.0
perturbation_delta_v: -3.0
noise_warmup_time: 3.0

enable_live_viz: false
play_recording: false

human_ratio: 0.75

idm_params:
  s0: 2.0
  T: 1.5
  a: 0.3
  b: 3.0
  v0: 14.0
  delta: 4

noise_Q: 0.45

acc_params:
  ks: 0.4
  kv: 1.3
  kf: 0.95
  kv0: 0.05
  b_max: 3.0
  b_comfort: 1.5
  a_max: 1.5
  v_max: 20.0
  v_des: 14.0

cth_params:
  d0: 3.5
  hc: 1.2

mesoscopic:
  enabled: true
  M: 8
  lambda_rho: 0.8
  gamma: 0.4
  alpha_min: 0.7
  alpha_max: 2.0
  enable_gain_scheduling: false
  enable_danger_mode: false
  sigma_v_min_threshold: 0.2
  v_eps_sigma: 0.5
  max_alpha_rate: 0.2
  sigma_v_ema_lambda: 0.9
  enable_k_f_adaptation: false
  psi_deadband: 0.5
  adaptation_mode: "highway"

dx: 1.0
kernel_h: 3.0

macro_teacher: "none"
save_macro_dataset: false

rl:
  rl_mode: "residual"
  output_path: "output/rl_eval"
  delta_alpha_max: 0.5
  alpha_min: 0.5
  alpha_max: 2.0
  checkpoint: "output/sac_train/gpu_sac_final.pt"
  deterministic: true

  # Reward weights (must match training)
  w_s: 5.0
  w_tau: 3.0
  w_v: 5.0
  w_j: 0.15
  w_ss: 0.75
  w_sigma: 0.5
  w_sigma_cav: 2.0
  w_alpha: 0.3
  w_alpha_final: 0.10
  w_damp: 0.3
  sigma_ref_damp: 1.0
  fleet_penalty_scaling: true

  # Reference values
  s_min: 2.0
  tau_min: 0.8
  v_ref: 5.5
  v_ref_delta: 3.0
  adaptive_v_ref: true
  j_ref: 5.0

  # Network (must match training)
  hidden_dim: 128
  num_hidden: 2
  shuffle_cav_positions: true
