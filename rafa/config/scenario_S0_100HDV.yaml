# =============================================================================
# Scenario S0: 100% Human-Driven Vehicles (0% CAV)
# Baseline scenario for pure HDV dynamics
# =============================================================================

# Scenario identification
scenario_name: "S0_100HDV"
scenario_description: "Baseline: 100% Human-Driven Vehicles"

# Vehicle composition
N: 22
human_ratio: 1.0  # 100% HDV, 0% CAV
L: 300.0
dt: 0.1
T: 150.0
initial_speed: 5.5
vehicle_length: 5.0

# IDM parameters (calibrated for stop-and-go waves)
idm_params:
  s0: 2.0
  T: 1.5
  a: 0.3
  b: 3.0
  v0: 14.0
  delta: 4

noise_Q: 0.4

# CAV parameters (not used in this scenario but required by config schema)
acc_params:
  ks: 0.4
  kv: 0.9
  kf: 0.7
  kv0: 0.05
  b_max: 3.0
  b_comfort: 1.5
  a_max: 1.5
  v_max: 20.0
  v_des: 14.0

cth_params:
  d0: 2.0
  hc: 1.2

# Macrofield generation
dx: 1.0
kernel_h: 3.0

# ARZ PDE solver parameters
macro_teacher: "arz"
save_macro_dataset: true
macro_predictor: "pde"

arz_params:
  v_max: 14.0  # Match training data distribution (was 30.0)
  rho_jam: 0.2
  gamma: 1.0

# Output configuration
output_path: "datasets/scenario_S0_100HDV/run_000"
seed: 42
