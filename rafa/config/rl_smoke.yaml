# =============================================================================
# RL Smoke Test Configuration
# Tiny scenario for verifying the training loop works end-to-end.
# =============================================================================

N: 10
L: 200.0
dt: 0.1
T: 30.0           # 300 steps per episode
initial_speed: 10.0
seed: 42
output_path: "output/rl_smoke"

initial_conditions: "uniform"
perturbation_enabled: true
perturbation_vehicle: 0
perturbation_time: 3.0
perturbation_delta_v: -2.0
noise_warmup_time: 3.0

enable_live_viz: false
play_recording: false

human_ratio: 0.5           # 50-50 mix (5 humans, 5 CAVs)

idm_params:
  s0: 2.0
  T: 1.5
  a: 0.3
  b: 3.0
  v0: 14.0
  delta: 4

noise_Q: 0.3

acc_params:
  ks: 0.4
  kv: 1.3
  kf: 0.95
  kv0: 0.05
  b_max: 3.0
  b_comfort: 1.5
  a_max: 1.5
  v_max: 20.0
  v_des: 14.0

cth_params:
  d0: 5.0
  hc: 1.2

mesoscopic:
  enabled: true
  M: 4
  lambda_rho: 0.8
  gamma: 0.4
  alpha_min: 0.7
  alpha_max: 2.0
  enable_gain_scheduling: false
  enable_danger_mode: false
  sigma_v_min_threshold: 0.2
  v_eps_sigma: 0.5
  max_alpha_rate: 0.2
  sigma_v_ema_lambda: 0.9
  enable_k_f_adaptation: false
  psi_deadband: 0.5
  adaptation_mode: "highway"

dx: 1.0
kernel_h: 3.0

macro_teacher: "none"
save_macro_dataset: false

# =============================================================================
# RL Configuration
# =============================================================================
rl:
  rl_mode: "residual"
  output_path: "output/rl_smoke"

  # Action bounds (match training)
  delta_alpha_max: 0.5
  alpha_min: 0.5
  alpha_max: 2.0

  # Reward weights (all terms dimensionless after normalisation)
  w_s: 5.0
  w_tau: 3.0
  w_v: 3.0
  w_j: 0.5
  w_ss: 2.0
  w_sigma: 4.0
  w_alpha: 1.0

  # Reference values
  s_min: 2.0
  tau_min: 1.0
  v_ref: 5.0
  j_ref: 5.0

  # PPO hyper-parameters (small for smoke test)
  gamma: 0.99
  lam_gae: 0.95
  eps_clip: 0.2
  lr_actor: 3.0e-4
  lr_critic: 1.0e-3
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  ppo_epochs: 4
  minibatch_size: 32
  rollout_steps: 128
  total_timesteps: 2000
  eval_interval: 1000
  log_interval: 500
  save_interval: 2000

  # Network
  hidden_dim: 64
  num_hidden: 2

  # Domain randomization
  hr_options: [0.0, 0.25, 0.5]
  normalizer_warmup_steps: 500
  use_meso_baseline: true
  use_meso_baseline: true
# =============================================================================
# Accelerator Smoke-Test Profile
# =============================================================================
gpu_training:
  device: "auto"
  profile: "cpu_debug"
  output_path: "output/rl_smoke_gpu"
  num_envs: 16
  rollout_steps: 64
  minibatch_size: 256
  eval_num_envs: 4
