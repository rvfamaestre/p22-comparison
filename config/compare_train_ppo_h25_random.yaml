warmup_accel_limit: 1.0
enable_live_viz: false
viz_update_interval: 10
play_recording: false

human_ratio: 0.25

idm_params:
  s0: 2.0
  T: 1.5
  a: 0.3
  b: 3.0
  v0: 14.0
  delta: 4

noise_Q: 0.45

acc_params:
