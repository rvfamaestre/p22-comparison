  b_comfort: 1.5
  a_max: 1.5
  v_max: 20.0
  v_des: 14.0

cth_params:
  d0: 2.0
  hc: 1.2

dx: 1.0
kernel_h: 3.0

mesoscopic:
  enabled: true
  M: 8
  lambda_rho: 0.8
  gamma: 0.4
  alpha_min: 0.9
  alpha_max: 1.6
  enable_gain_scheduling: false
  enable_danger_mode: false
