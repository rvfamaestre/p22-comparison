  minibatch_size: 256
  value_coef: 0.5
  entropy_coef: 0.001
  max_grad_norm: 0.5
  save_every: 20
  early_stop_patience: 5
  tau: 0.005
  entropy_alpha: 0.2
  batch_size: 256
  reward:
    s_min: 2.0
    tau_min: 0.6
    j_ref: 3.0
    epsilon_v: 0.001
    epsilon_s: 0.001
