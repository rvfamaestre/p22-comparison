# =============================================================================
# Type-Swap Transition Scenario Configuration
# =============================================================================
# CRITICAL: This is a type replacement system, NOT traffic simulation
# - Zones are VISUAL ONLY (no physics impact)
# - Swaps happen IN-PLACE (same x, v, a)
# - NO insertion/removal/waiting logic
# =============================================================================

# Global parameters
N: 20                    # Total vehicles (constant)
L: 300.0                 # Ring length (meters)
dt: 0.1                  # Timestep (seconds)
T: 200.0                 # Total time (will stop early when all CAVs)
initial_speed: 14.0      # Start near free-flow
seed: 42
output_path: "output/type_swap_zones"

# Swap parameters
swap_interval: 20.0      # Swap every 20 seconds
swap_ratio: 0.25         # Convert 25% per event (k=5 for N=20)

# Visual zones (NO physics impact)
arrival_zone:
  center_x: 225.0        # Right side of ring
  width: 30.0            # Zone extent

departure_zone:
  center_x: 75.0         # Left side of ring
  width: 30.0            # Zone extent

# IDM parameters (for humans)
idm_params:
  s0: 2.0                # Minimum gap
  T: 1.0                 # Time headway
  a: 1.5                 # Acceleration
  b: 2.0                 # Braking
  v0: 16.0               # Desired speed
  delta: 4

noise_Q: 0.1             # Low noise for stability

# ACC parameters (for CAVs after swap)
acc_params:
  ks: 0.5                # Spacing gain
  kv: 0.8                # Velocity gain
  kv0: 0.3               # Free-flow gain
  v_des: 16.0            # Desired speed (match IDM)
  b_max: 3.0             # Max braking
  v_max: 20.0            # Speed cap

# CTH parameters
cth_params:
  d0: 2.0                # Standstill distance
  hc: 0.9                # Time headway

# Macrofield parameters
dx: 1.0
sph_h: 5.0

# Vehicle properties
vehicle_length: 5.0
