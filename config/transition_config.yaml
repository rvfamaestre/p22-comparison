# =============================================================================
# Mixed-Autonomy Transition Scenario Configuration
# =============================================================================
# Gradual human-to-CAV transition on ring road with arrival/departure zones
# =============================================================================

# -----------------------------
# Global simulation parameters
# -----------------------------
N: 15                    # Total number of vehicles (constant throughout) - reduced for better flow
L: 300.0                 # Ring length (meters)
dt: 0.1                  # Timestep (seconds)
T: 300.0                 # Maximum simulation time (seconds) - stops early at 100% CAV + 20s
initial_speed: 12.0      # Initial velocity (m/s)
seed: 42
output_path: "output/transition_scenario"

# -----------------------------
# Transition parameters
# -----------------------------
swap_interval: 20.0      # Time between swap events (seconds)
swap_ratio: 0.25         # Fraction of humans to remove per swap (25%)

# -----------------------------
# Arrival/Departure Zones
# -----------------------------
arrival_zone:
  center_x: 75.0         # Position on ring (meters) - right side at L/4
  width: 30.0            # Zone width (meters)

departure_zone:
  center_x: 225.0        # Position on ring (meters) - left side at 3L/4
  width: 30.0            # Zone width (meters)

# =============================================================================
# HUMAN VEHICLE MODEL (IDM)
# =============================================================================
use_stochastic_human: true

idm_params:
  s0: 2.0       # Minimum gap (meters)
  T: 1.3        # Time headway (seconds) - slightly reduced for better flow
  a: 1.0        # Acceleration (m/s²) - increased for faster recovery
  b: 2.5        # Braking (m/s²)
  v0: 15.0      # Desired speed (m/s)
  delta: 4      # Acceleration exponent

noise_Q: 0.3    # Stochastic noise for human drivers

# =============================================================================
# CAV VEHICLE MODEL (ACC + CTH)
# =============================================================================
acc_params:
  ks: 0.4       # Spacing gain (position error) - reduced for stability
  kv: 0.6       # Velocity gain (derivative)
  kf: 0.5       # Feedforward gain (leader acceleration)
  kv0: 0.2      # Free-flow gain (convergence to v_des) - increased
  v_des: 15.0   # Desired free-flow speed (m/s)
  b_max: -3.0   # Maximum braking (m/s²)
  b_comfort: 1.5  # Comfort braking (m/s²)
  v_max: 20.0   # Maximum velocity (m/s)
  a_max: 2.5    # Maximum acceleration (m/s²) - increased

cth_params:
  d0: 2.0       # Standstill distance (meters) - bumper-to-bumper minimum
  hc: 1.0       # Time headway (seconds)

# =============================================================================
# MACROSCOPIC FIELD GENERATION (Optional - for analysis)
# =============================================================================
dx: 1.0                  # Grid spacing (meters)
sph_smoothing_length: 10.0  # SPH kernel width (meters)
