# =============================================================================
# Mixed-Autonomy Ring-Road Simulator Configuration
# =============================================================================
# CRITICAL FIX: Parameters compatible with 300m ring / 20 vehicles
# Average spacing: 15m per vehicle
# Previous config caused traffic collapse (desired spacing > available spacing)
# =============================================================================

# -----------------------------
# Global simulation parameters
# -----------------------------
N: 28
L: 300.0
dt: 0.05
T: 60.0
initial_speed: 12
seed: 42
human_ratio: 1
output_path: "output/run1"

# =============================================================================
# HUMAN VEHICLE MODEL (Stochastic IDM)
# =============================================================================
# FIXED: Desired spacing s* = s0 + T*v ≈ 2.0 + 0.8*15 = 14m ≈ 15m average ✓
# Previous s0=5.0, T=1.5 gave s*=27.5m (impossible!) causing constant braking
# =============================================================================
idm_params:
  s0: 1.2      # Minimum spacing (meters) - standard Treiber value
  T: 0.7 #0.8       # Time headway (seconds) - allows closer following
  a: 1       # Maximum acceleration (m/s²)
  b: 1.3       # Comfortable deceleration (m/s²)
  v0: 18.0     # Desired free-flow speed (m/s)
  delta: 4     # Acceleration exponent

noise_Q: 0.05   # Noise intensity - enough for instability, not collapse

# =============================================================================
# CAV VEHICLE MODEL (String-Stable ACC + CTH)
# =============================================================================
# CAV MODEL — DISABLED (100% human)
# =============================================================================
acc_params:
  ks: 0.0     # spacing gain (gentler control)
  kv: 0.60      # velocity gain (satisfies stability condition)
  kv0: 0.0     # free-flow gain (maintains desired speed)
  b_max: 2.0   # maximum braking (m/s²)
  a_max: 1.50   # maximum acceleration (m/s²)
  v_max: 25.0  # speed limit (m/s)
  v_des: 15.0  # desired cruising speed (m/s)

cth_params:
  d0: 1.5      # standstill distance (meters)
  hc: 0.5      # time headway (seconds)

# =============================================================
# MACROFIELD (SPH) GENERATOR
# =============================================================
dx: 1.0
kernel_h: 3.0
