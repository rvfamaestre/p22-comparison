# Free-Flow Transition Configuration
# This configuration promotes smooth traffic flow instead of stop-and-go waves

N: 10                    # Lower density
L: 300.0
dt: 0.1
T: 300.0
initial_speed: 13.0      # Close to desired speed
seed: 42

# IDM parameters for SMOOTH FLOW
idm_params:
  s0: 2.0
  T: 1.0                 # Lower time headway = more aggressive
  a: 1.5                 # HIGH acceleration (vs 0.3 in original)
  b: 2.0                 # Moderate comfortable braking
  v0: 15.0               # Higher desired speed
  delta: 4

# Minimal noise for stability
noise_Q: 0.05            # Much lower than 0.5

# ACC parameters
acc_params:
  ks: 0.5
  kv: 0.8
  kv0: 0.3               # Free-flow gain
  v_des: 15.0            # Match IDM v0
  b_max: 3.0
  v_max: 20.0            # Maximum speed

# CTH parameters - more aggressive following
cth_params:
  d0: 2.0
  hc: 0.8                # Lower time headway = tighter following

# Transition parameters
swap_interval: 20.0
swap_ratio: 0.25

# Zone definitions (same)
arrival_zone:
  center_x: 225.0
  width: 30.0

departure_zone:
  center_x: 75.0
  width: 30.0

# Macrofield parameters (same)
dx: 1.0
sph_h: 5.0

# Vehicle properties (same)
vehicle_length: 5.0

# Minimal warm-up
warmup_duration: 3.0
warmup_acc_limit: 3.0    # High limit = less constraint

# Output
output_path: "output/free_flow_transition"
